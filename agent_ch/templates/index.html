<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Tutor</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <style>
    .height-600 {
  height: 600px;
}

    .score-display {
      position: fixed;
      top: 80px;
      right: 20px;
      background-color: white;
      padding: 12px 18px;
      border-radius: 12px;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.15);
      z-index: 1000;
      font-weight: 600;
      color: #1f2937;
    }
    .hidden {
      display: none;
    }
    #messages-container::-webkit-scrollbar {
      width: 6px;
    }
    #messages-container::-webkit-scrollbar-thumb {
      background-color: rgba(0, 0, 0, 0.2);
      border-radius: 3px;
    }
  </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-gray-100 to-gray-200 font-sans">

  <!-- Header -->
  <header class="bg-white shadow">
    <div class="max-w-4xl mx-auto px-4 py-5 flex items-center space-x-3">
      <svg class="w-8 h-8 text-indigo-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M12 14l-3 3 3 3 3-3-3-3z" />
      </svg>
      <h1 class="text-3xl font-semibold text-gray-800 tracking-tight">AI Tutor</h1>
    </div>
  </header>

  <!-- Score Display -->
  <div id="score-display" class="score-display hidden">
    Score: <span id="score-value">0</span>
  </div>

  <!-- Main Chat Area -->
  <main class="max-w-4xl mx-auto px-4 py-8">
    <div class="bg-white rounded-xl shadow-lg h-[600px] flex flex-col overflow-hidden">
      <!-- Messages -->
      <div id="messages-container" class="flex-1 overflow-y-auto p-5 space-y-4 scroll-smooth">
        <!-- Dynamic chat messages -->
      </div>

      <!-- Chat Input -->
      <form id="chat-form" class="p-4 border-t bg-gray-50">
        <div class="flex gap-3">
          <input type="text" id="input-message" placeholder="Type your message..."
                 class="flex-1 px-4 py-2 border border-gray-300 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:outline-none transition" />
          <button type="submit" id="send-button"
                  class="px-5 py-2.5 bg-indigo-600 text-white font-medium rounded-xl hover:bg-indigo-700 transition-all">
            Send
          </button>
        </div>
      </form>
    </div>
  </main>

  <!-- Script Section -->
  <script>
    function createMessageElement(message) {
      const messageDiv = document.createElement('div');
      messageDiv.classList.add('flex', message.role === 'user' ? 'justify-end' : 'justify-start', 'animate-fadeIn');

      const innerDiv = document.createElement('div');
      innerDiv.classList.add('max-w-[75%]', 'px-4', 'py-2.5', 'rounded-xl', 'text-sm', 'whitespace-pre-wrap');

      if (message.role === 'user') {
        innerDiv.classList.add('bg-indigo-600', 'text-white');
      } else {
        innerDiv.classList.add('bg-gray-200', 'text-gray-800');
      }

      const htmlContent = message.content
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
        .replace(/\n/g, '<br>');

      innerDiv.innerHTML = htmlContent;
      messageDiv.appendChild(innerDiv);
      return messageDiv;
    }

    function scrollToBottom() {
      const container = document.getElementById('messages-container');
      container.scrollTop = container.scrollHeight;
    }

    const messages = [];
    const sessionId = Math.random().toString(36).substring(7);
    let loading = false;
    let currentScore = 0;

    function updateScoreDisplay(score) {
      const scoreDisplay = document.getElementById('score-display');
      const scoreValue = document.getElementById('score-value');

      if (score !== undefined) {
        currentScore = score;
        scoreValue.textContent = score;
      } else {
        scoreValue.textContent = currentScore;
      }

      scoreDisplay.classList.remove('hidden');
    }

    function addMessage(message) {
      messages.push(message);
      const container = document.getElementById('messages-container');
      const messageElement = createMessageElement(message);
      container.appendChild(messageElement);
      scrollToBottom();
    }

    function setLoading(isLoading) {
      loading = isLoading;
      const sendButton = document.getElementById('send-button');
      sendButton.disabled = isLoading;

      const container = document.getElementById('messages-container');
      if (isLoading) {
        const loadingDiv = document.createElement('div');
        loadingDiv.id = 'loading-indicator';
        loadingDiv.classList.add('flex', 'justify-start');
        const innerDiv = document.createElement('div');
        innerDiv.classList.add('bg-gray-200', 'rounded-xl', 'px-4', 'py-2.5', 'text-sm');
        innerDiv.innerHTML = '<span>Thinking...</span>';
        loadingDiv.appendChild(innerDiv);
        container.appendChild(loadingDiv);
        scrollToBottom();
      } else {
        const loadingDiv = document.getElementById('loading-indicator');
        if (loadingDiv) loadingDiv.remove();
      }
    }

    document.addEventListener('DOMContentLoaded', function() {
      updateScoreDisplay(0);

      addMessage({
        role: 'ai',
        content: '👋 Welcome to **AI Tutor**! How can I help you with your learning journey today?'
      });

      fetch('http://localhost:5000/api/courses')
        .then(response => response.json())
        .then(courses => {
          const coursesText = courses.map(course => '- ' + course).join('\n');
          addMessage({
            role: 'ai',
            content: `📚 **Available Courses:**\n${coursesText}\n\nType the course name you'd like to study.`
          });
        })
        .catch(error => console.error('Error fetching courses:', error));

      document.getElementById('chat-form').addEventListener('submit', async function(e) {
        e.preventDefault();
        const inputField = document.getElementById('input-message');
        const messageText = inputField.value.trim();
        if (!messageText) return;

        addMessage({ role: 'user', content: messageText });
        inputField.value = '';

        setLoading(true);
        try {
          const response = await fetch('http://localhost:5000/api/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ message: messageText, session_id: sessionId })
          });
          const data = await response.json();
          addMessage({ role: 'ai', content: data.response });

          const scoreMatch = data.response.match(/Your (current|final) score: (\d+)/);
          if (scoreMatch) updateScoreDisplay(parseInt(scoreMatch[2]));
        } catch (error) {
          console.error('Error sending message:', error);
          addMessage({ role: 'ai', content: '❌ Sorry, there was an error. Please try again.' });
        } finally {
          setLoading(false);
        }
      });
    });
  </script>
</body>
</html>
